name: Build and Release APK

on:
  push:
    branches:
      - '**' # Triggers on push to any branch
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Needed for creating a GitHub Release

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: space-time-app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create or Update GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Phone Build
          body: |
            This release contains the latest working APK built directly from your Google AI Studio applet.
            
            ### How to download on your phone:
            1. Tap on `app-debug.apk` below under **Assets** to download it directly to your mobile phone.
            2. Run the downloaded APK file to install and use the app.
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
