name: Build and Release APK

on:
  push:
    branches:
      - '**' # Triggers on push to any branch
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Needed for creating a GitHub Release

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Delete Corrupt Wrapper
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          echo "Deleted potentially corrupt gradle-wrapper.jar"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Regenerate Clean Wrapper
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Prepare build environment (keystore and env files)
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 --decode debug.keystore.base64 > debug.keystore
            echo "Successfully decoded debug.keystore"
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi
          touch .env
          echo "Created empty .env file"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: space-time-app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create or Update GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Phone Build
          body: |
            This release contains the latest working APK built directly from your Google AI Studio applet.
            
            ### How to download on your phone:
            1. Tap on `app-debug.apk` below under **Assets** to download it directly to your mobile phone.
            2. Run the downloaded APK file to install and use the app.
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
